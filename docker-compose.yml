name: cortex
services:
  nats:
    image: nats:2.12-alpine
    command:
      - -js
      - -sd
      - /data
      - -m
      - "8222"
    ports:
      - 4223:4222 # client (4223 on host to avoid colliding with other local NATS)
      - 8223:8222 # monitoring
    volumes:
      - nats_data:/data
    restart: unless-stopped
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.38.0
    ports:
      - 8081:8080 # REST (8081 on host to avoid colliding with other local services)
      - 50051:50051 # gRPC
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: cortex
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: unless-stopped
  ollama:
    image: ollama/ollama:latest
    ports:
      - 11434:11434
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
  # Indexing worker: NATS -> Ollama embed -> Weaviate. The only writer.
  worker:
    image: ${CORTEX_IMAGE:-ghcr.io/thomas-maurice/cortex:latest}
    entrypoint: ["/usr/local/bin/cortex-worker"]
    environment:
      NATS_URL: nats://nats:4222
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen3-embedding:0.6b
      WEAVIATE_HOST: weaviate:8080
      WEAVIATE_GRPC_HOST: weaviate:50051
      # Heuristic dedup: flag existing memories within this cosine distance of a
      # newly indexed one as duplicate candidates (review via `cortex candidates`,
      # the cortex_review_candidates MCP tool, or the graph UI). 0 disables it.
      # Model-specific — qwen3 distances are compressed, so start tight (~0.1) and
      # tune against your data. The worker never deletes/merges on its own.
      DEDUP_DISTANCE: ${DEDUP_DISTANCE:-0}
      # Chunking: the worker splits each memory into overlapping, token-bounded
      # chunks and indexes those as the primary search target (a fact buried in a
      # long memory is matched at the chunk level, not against the whole-document
      # vector). Sizes are token counts via a cl100k proxy tokenizer. Set
      # CHUNKING_ENABLED=false to turn it off (worker writes only whole-memory
      # vectors); keep it identical on the server. Sizes are ignored when disabled.
      CHUNKING_ENABLED: ${CHUNKING_ENABLED:-true}
      CHUNK_MAX_TOKENS: ${CHUNK_MAX_TOKENS:-512}
      CHUNK_OVERLAP_TOKENS: ${CHUNK_OVERLAP_TOKENS:-64}
      # Multi-tenancy (per-user isolation). DEFAULT ON. Set to false for legacy
      # single-user mode. Must match the server. An EXISTING (pre-MT) store needs a
      # one-time `cortex migrate-mt` after first enabling it.
      CORTEX_MULTI_TENANT: ${CORTEX_MULTI_TENANT:-true}
    depends_on:
      - nats
      - weaviate
      - ollama
    restart: unless-stopped
  # Connect RPC server: the single owner of NATS + Weaviate + Ollama. The MCP
  # server and cortex CLI are thin clients of this. Set CORTEX_AUTH_TOKEN in the
  # environment (or a .env file) before exposing the host port off localhost.
  server:
    image: ${CORTEX_IMAGE:-ghcr.io/thomas-maurice/cortex:latest}
    entrypoint: ["/usr/local/bin/cortex-server"]
    ports:
      - 8088:8080 # 8088 on host to avoid colliding with other local services
    environment:
      CORTEX_LISTEN: :8080
      NATS_URL: nats://nats:4222
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen3-embedding:0.6b
      WEAVIATE_HOST: weaviate:8080
      WEAVIATE_GRPC_HOST: weaviate:50051
      # Hybrid search blend (BM25 keyword vs vector): 1.0 = pure vector/semantic,
      # 0.0 = pure keyword. 0.5 leans more on keyword than Weaviate's 0.75 default
      # so exact tokens — hostnames, codenames, IDs — surface, not just semantic
      # matches. Tune per your data; <=0 falls back to the built-in default.
      SEARCH_ALPHA: ${SEARCH_ALPHA:-0.5}
      # Must match the worker's CHUNKING_ENABLED: true → search the chunk index
      # (with a whole-memory fallback for un-chunked memories), false → search
      # whole-memory vectors only (pre-chunking behaviour).
      CHUNKING_ENABLED: ${CHUNKING_ENABLED:-true}
      # "Living memory": usage-aware re-ranking + hit reinforcement. RERANK_WEIGHT
      # is the usage share vs relevance (0 = OFF, the safe default; the whole
      # feature, including reinforcement writes, is disabled at 0). RERANK_HALFLIFE_DAYS
      # is the recency half-life; REINFORCE_TOPK is how many top hits a search counts
      # as a recall. Only the agent (MCP) reinforces — the UI/CLI pass no_reinforce.
      RERANK_WEIGHT: ${RERANK_WEIGHT:-0}
      RERANK_HALFLIFE_DAYS: ${RERANK_HALFLIFE_DAYS:-30}
      REINFORCE_TOPK: ${REINFORCE_TOPK:-1}
      DEFAULT_NAMESPACE: global
      MEMORY_SOURCE: cortex
      CORTEX_AUTH_TOKEN: ${CORTEX_AUTH_TOKEN:-}
      # Stable JWT signing key so UI login sessions survive a server restart.
      # Unset -> the server generates a random per-process secret and all sessions
      # are invalidated on every restart. Keep this out of git (it lives in .env).
      CORTEX_JWT_SECRET: ${CORTEX_JWT_SECRET:-}
      CORTEX_UI_USER: ${CORTEX_UI_USER:-admin}
      CORTEX_UI_PASSWORD: ${CORTEX_UI_PASSWORD:-admin}
      # Multi-tenancy (per-user isolation via Weaviate multi-tenancy, tenant=user).
      # DEFAULT ON; set CORTEX_MULTI_TENANT=false for legacy single-user mode. Must
      # match the worker. The bootstrap admin defaults to CORTEX_UI_USER/PASSWORD
      # (admin/admin here) and registers CORTEX_AUTH_TOKEN as its API key, so the
      # stack is usable out of the box; override the CORTEX_BOOTSTRAP_* vars to set
      # them explicitly. An EXISTING (pre-MT) store needs a one-time `cortex
      # migrate-mt` to move its memories into the admin's tenant.
      CORTEX_MULTI_TENANT: ${CORTEX_MULTI_TENANT:-true}
      CORTEX_BOOTSTRAP_USER: ${CORTEX_BOOTSTRAP_USER:-}
      CORTEX_BOOTSTRAP_PASSWORD: ${CORTEX_BOOTSTRAP_PASSWORD:-}
      CORTEX_BOOTSTRAP_API_KEY: ${CORTEX_BOOTSTRAP_API_KEY:-}
    depends_on:
      - nats
      - weaviate
      - ollama
    restart: unless-stopped
volumes:
  nats_data:
  weaviate_data:
  ollama_data:
